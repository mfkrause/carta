# cargo-deny configuration. Run with `cargo deny check` (CI installs the tool).
# Guards dependency licenses, security advisories, and source provenance.

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
confidence-threshold = 0.9
private = { ignore = true }
# Permissive licenses acceptable for dependencies of an independent project.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "CC0-1.0",
  "MPL-2.0",
]
# The workspace's own crates carry the project license, AGPL-3.0-only. Allow it for these
# first-party crates only — copyleft dependencies stay disallowed.
exceptions = [
  { allow = ["AGPL-3.0-only"], name = "carta" },
  { allow = ["AGPL-3.0-only"], name = "carta-ast" },
  { allow = ["AGPL-3.0-only"], name = "carta-core" },
  { allow = ["AGPL-3.0-only"], name = "carta-readers" },
  { allow = ["AGPL-3.0-only"], name = "carta-writers" },
  { allow = ["AGPL-3.0-only"], name = "carta-cli" },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Workspace-internal crates are referenced by path with no version, which Cargo treats as `*`.
# Deny wildcards on registry dependencies but permit them for these path dependencies.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"

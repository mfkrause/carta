[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
confidence-threshold = 0.9
private = { ignore = true }
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "CC0-1.0",
  "MPL-2.0",
  # Bundled Mozilla root-certificate data in the TLS stack.
  "CDLA-Permissive-2.0",
]
# First-party crates carry AGPL-3.0-only; copyleft dependencies stay disallowed.
exceptions = [
  { allow = ["AGPL-3.0-only"], name = "carta" },
  { allow = ["AGPL-3.0-only"], name = "carta-ast" },
  { allow = ["AGPL-3.0-only"], name = "carta-core" },
  { allow = ["AGPL-3.0-only"], name = "carta-highlight" },
  { allow = ["AGPL-3.0-only"], name = "carta-readers" },
  { allow = ["AGPL-3.0-only"], name = "carta-writers" },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Path deps have no version (Cargo treats as `*`); deny wildcards only for registry deps.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"

name: fuzz (nightly discovery)

# Deliberately not a PR gate: discovery runs are non-deterministic (random seed, evolving corpus),
# so a latent bug could block an unrelated PR. Findings become seeds under fuzz/seeds/<target>/, replayed per-PR in ci.yml.

on:
  schedule:
    - cron: "17 4 * * *" # off the hour to dodge the scheduler's peak
  workflow_dispatch:
    inputs:
      seconds:
        description: Seconds of fuzzing per target (-max_total_time)
        default: "300"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  shard-matrix:
    name: shard targets
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      shards: ${{ steps.chunk.outputs.shards }}
    steps:
      - uses: actions/checkout@v7
      - name: Chunk fuzz targets into shards
        id: chunk
        # Targets come from fuzz/Cargo.toml's [[bin]] table so the set never drifts; shards of at
        # most 20 fuzz serially (one compile each), so shard count scales instead of wall clock.
        run: |
          names=$(grep '^name = ' fuzz/Cargo.toml | grep -v 'carta-fuzz' | cut -d'"' -f2)
          set -- $names
          total=$#
          max_per_shard=20
          shard_count=$(( (total + max_per_shard - 1) / max_per_shard ))
          per_shard=$(( (total + shard_count - 1) / shard_count ))
          json=""
          index=0
          while [ $# -gt 0 ]; do
            chunk=""
            n=0
            while [ $# -gt 0 ] && [ $n -lt $per_shard ]; do
              chunk="$chunk $1"
              shift
              n=$((n + 1))
            done
            json="$json,{\"index\":$index,\"list\":\"${chunk# }\"}"
            index=$((index + 1))
          done
          echo "shards=[${json#,}]" >> "$GITHUB_OUTPUT"

  fuzz:
    name: fuzz shard ${{ matrix.shard.index }}
    needs: shard-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(needs.shard-matrix.outputs.shards) }}
    # Headroom for dispatched budgets up to ~900 s/target; beyond that, lower max_per_shard instead.
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v7
      - name: Install nightly toolchain
        run: rustup toolchain install nightly
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: fuzz
      - uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2
        with:
          tool: cargo-fuzz
      - name: Restore evolved corpus
        uses: actions/cache@v6
        with:
          path: fuzz/corpus
          # Fresh per-shard key each run writes back the grown corpus; restore-keys pull the newest
          # prior tree, falling back to other shards' so a migrating target keeps its corpus.
          key: fuzz-corpus-shard-${{ matrix.shard.index }}-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-shard-${{ matrix.shard.index }}-
            fuzz-corpus-shard-
            fuzz-corpus-all-
      - name: Fuzz shard targets
        # Serial loop shares one compile; writable first corpus dir, read-only seeds; -timeout/-rss_limit_mb
        # turn hangs into crashes; failures collect so all targets fuzz. gnu target: musl defeats the sanitizer.
        #
        # malloc_context_size=0: ASan interns per-allocation stacks forever, ratcheting RSS past
        # -rss_limit_mb on allocation-heavy runs and yielding phantom OOMs; panics are unaffected.
        env:
          ASAN_OPTIONS: malloc_context_size=0
        run: |
          failed=""
          for t in ${{ matrix.shard.list }}; do
            echo "::group::fuzz $t"
            mkdir -p "fuzz/corpus/$t"
            cargo +nightly fuzz run "$t" \
              --target x86_64-unknown-linux-gnu \
              "fuzz/corpus/$t" "fuzz/seeds/$t" \
              -- -max_total_time=${{ github.event.inputs.seconds || '300' }} \
                 -timeout=10 -rss_limit_mb=2048 || failed="$failed $t"
            echo "::endgroup::"
          done
          if [ -n "$failed" ]; then
            echo "fuzz findings:$failed" >&2
            exit 1
          fi
      - name: Upload crash reproducers
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-artifacts-shard-${{ matrix.shard.index }}
          path: fuzz/artifacts/
          if-no-files-found: ignore

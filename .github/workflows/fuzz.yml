name: fuzz (nightly discovery)

# Random-seeded, mutation-based fuzzing — the actual bug hunt. It is deliberately NOT a PR gate:
# a discovery run is non-deterministic (random seed, evolving corpus, wall-clock budget), so
# gating merges on it would let an unrelated PR be blocked by a latent bug it did not introduce,
# and a re-run could flip red/green. Findings surface here instead — uploaded as crash
# reproducers — and become a committed seed under fuzz/seeds/<target>/ once fixed, which the
# per-PR regression replay in ci.yml then guards forever.

on:
  schedule:
    - cron: "17 4 * * *" # daily at 04:17 UTC (off the hour to dodge the scheduler's peak)
  workflow_dispatch:
    inputs:
      seconds:
        description: Seconds of fuzzing per target (-max_total_time)
        default: "300"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  shard-matrix:
    name: shard targets
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      shards: ${{ steps.chunk.outputs.shards }}
    steps:
      - uses: actions/checkout@v7
      - name: Chunk fuzz targets into shards
        id: chunk
        # Derive the target set from fuzz/Cargo.toml so it never drifts from the [[bin]] table,
        # then split it into evenly sized shards of at most 20 targets. Each shard fuzzes its
        # targets serially in one job (one compile per shard), so per-shard wall clock stays at
        # ~20 × budget regardless of how many targets the crate grows — the shard count scales
        # instead, and a single serial job can never crawl into the 6 h job ceiling.
        run: |
          names=$(grep '^name = ' fuzz/Cargo.toml | grep -v 'carta-fuzz' | cut -d'"' -f2)
          set -- $names
          total=$#
          max_per_shard=20
          shard_count=$(( (total + max_per_shard - 1) / max_per_shard ))
          per_shard=$(( (total + shard_count - 1) / shard_count ))
          json=""
          index=0
          while [ $# -gt 0 ]; do
            chunk=""
            n=0
            while [ $# -gt 0 ] && [ $n -lt $per_shard ]; do
              chunk="$chunk $1"
              shift
              n=$((n + 1))
            done
            json="$json,{\"index\":$index,\"list\":\"${chunk# }\"}"
            index=$((index + 1))
          done
          echo "shards=[${json#,}]" >> "$GITHUB_OUTPUT"

  fuzz:
    name: fuzz shard ${{ matrix.shard.index }}
    needs: shard-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(needs.shard-matrix.outputs.shards) }}
    # At most 20 targets × 300 s = 100 min of fuzzing plus one compile per shard. The timeout
    # leaves headroom for a manually dispatched budget up to ~900 s/target; beyond that, lower
    # max_per_shard in the shard-matrix job instead of raising this timeout.
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v7
      - name: Install nightly toolchain
        run: rustup toolchain install nightly
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: fuzz
      - uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2
        with:
          tool: cargo-fuzz
      - name: Restore evolved corpus
        uses: actions/cache@v6
        with:
          path: fuzz/corpus
          # A fresh key every run so each night writes back the grown corpus; restore-keys pulls
          # the most recent prior corpus, so coverage compounds across nights instead of starting
          # cold each time. Keys are per-shard so parallel shards do not race one namespace; each
          # shard restores its own latest tree first and falls back to any other shard's (or the
          # pre-shard `-all-`) cache, so a target migrating between shards as the [[bin]] table
          # grows carries its corpus along instead of restarting cold.
          key: fuzz-corpus-shard-${{ matrix.shard.index }}-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-shard-${{ matrix.shard.index }}-
            fuzz-corpus-shard-
            fuzz-corpus-all-
      - name: Fuzz shard targets
        # Loop this shard's targets serially, sharing the single compile. The first corpus dir
        # is writable — new interesting inputs land there and are cached for the next night; the
        # committed seeds are added read-only. -timeout / -rss_limit_mb turn a hang or runaway
        # allocation into a reported crash instead of a silently stuck runner. fail-fast: false
        # semantics are preserved — every target fuzzes, failures are collected and reported
        # together so crash reproducers for all targets get uploaded.
        # Pin the gnu target: musl links libc statically and the sanitizer cannot instrument it.
        #
        # malloc_context_size=0 stops ASan from recording a call stack for every allocation. Those
        # stacks are interned forever in ASan's stack depot, so on an allocation-heavy recursive
        # parser the depot alone ratchets process RSS past -rss_limit_mb over a long run and
        # libFuzzer reports a phantom OOM against whatever innocent unit it happens to be running
        # (this is exactly how the dokuwiki job went red nightly). The stacks only decorate ASan's
        # "allocated by" notes on memory-bug reports — panics, the finding class that matters for
        # pure-Rust readers, are unaffected — and any reproducer can be replayed locally with
        # default options when those notes are wanted.
        env:
          ASAN_OPTIONS: malloc_context_size=0
        run: |
          failed=""
          for t in ${{ matrix.shard.list }}; do
            echo "::group::fuzz $t"
            mkdir -p "fuzz/corpus/$t"
            cargo +nightly fuzz run "$t" \
              --target x86_64-unknown-linux-gnu \
              "fuzz/corpus/$t" "fuzz/seeds/$t" \
              -- -max_total_time=${{ github.event.inputs.seconds || '300' }} \
                 -timeout=10 -rss_limit_mb=2048 || failed="$failed $t"
            echo "::endgroup::"
          done
          if [ -n "$failed" ]; then
            echo "fuzz findings:$failed" >&2
            exit 1
          fi
      - name: Upload crash reproducers
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-artifacts-shard-${{ matrix.shard.index }}
          path: fuzz/artifacts/
          if-no-files-found: ignore

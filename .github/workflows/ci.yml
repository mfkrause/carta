name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Pinned pandoc version for the differential oracle. The local pin lives in gitignored
  # .oracle/PANDOC_VERSION; CI pins it explicitly so the corpus round-trip tests are reproducible
  # and don't drift with upstream pandoc releases.
  PANDOC_PIN: "3.10"

jobs:
  check:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install toolchain
        run: rustup show active-toolchain || rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features
      - name: Test
        run: cargo nextest run --workspace --all-features
      - name: Doctests
        run: cargo test --doc --workspace --all-features

  conformance:
    name: conformance (differential)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install toolchain
        run: rustup show active-toolchain || rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - name: Cache pandoc oracle
        uses: actions/cache@v5
        with:
          path: .oracle
          key: oracle-pandoc-${{ env.PANDOC_PIN }}
      - name: Provision pandoc oracle
        run: |
          tools/install-pandoc.sh --version="$PANDOC_PIN"
          tools/fetch-pandoc-tests.sh
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Build oxidoc
        run: cargo build -p oxidoc-cli
      - name: Run conformance suite
        run: tools/conformance-suite/run.sh all

  coverage:
    name: coverage (≥90%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install toolchain
        run: rustup show active-toolchain || rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Measure coverage (offline, product crates only)
        run: cargo llvm-cov --workspace --summary-only --fail-under-lines 90

  minimal:
    name: minimal feature build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install toolchain
        run: rustup show active-toolchain || rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Build single-direction config
        run: cargo build -p oxidoc --no-default-features --features read-commonmark,write-html
      - name: Test single-direction config
        run: cargo nextest run -p oxidoc --no-default-features --features read-commonmark,write-html
      - name: Build zero-format config
        run: cargo build -p oxidoc --no-default-features

  fuzz-smoke:
    name: fuzz smoke (nightly)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # One entry per reader fuzz target (see fuzz/Cargo.toml). Add new readers here.
        target: [commonmark, json, native, html]
    steps:
      - uses: actions/checkout@v6
      - name: Install nightly toolchain
        run: rustup toolchain install nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - name: Smoke-run ${{ matrix.target }} target
        # Pin the gnu target explicitly: the prebuilt cargo-fuzz from install-action is a musl
        # binary and defaults to its own musl triple, but musl links libc statically and the
        # sanitizer cannot instrument a static libc. Building for the runner's gnu host avoids it.
        run: cargo +nightly fuzz run ${{ matrix.target }} --target x86_64-unknown-linux-gnu -- -max_total_time=30

  typos:
    name: typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: crate-ci/typos@master

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install toolchain
        run: rustup show active-toolchain || rustup toolchain install
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: Check dependencies
        run: cargo deny check

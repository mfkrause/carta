name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Pinned pandoc version for the differential oracle. The local pin lives in gitignored
  # .oracle/PANDOC_VERSION; CI pins it explicitly so the corpus round-trip tests are reproducible
  # and don't drift with upstream pandoc releases.
  PANDOC_PIN: "3.10"

jobs:
  lint:
    name: fmt · clippy · docs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Install toolchain
        run: rustup show active-toolchain || rustup toolchain install
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features
      - name: Docs
        # Fail on any rustdoc warning (broken intra-doc links, stale references). Libraries
        # only: that is what docs.rs publishes, and --lib also sidesteps the collision
        # between the `carta` library and the `carta` binary.
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --workspace --lib --all-features

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - name: Install toolchain
        run: rustup show active-toolchain || rustup toolchain install
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2
        with:
          tool: cargo-nextest
      - name: Install cargo-insta
        if: matrix.os == 'ubuntu-latest'
        uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2
        with:
          tool: cargo-insta
      # The snapshot orphan check (`--unreferenced=reject`) only needs to run once; the rest
      # of the matrix exercises the same suite for platform parity.
      - name: Test (rejecting stale snapshots)
        if: matrix.os == 'ubuntu-latest'
        run: cargo insta test --workspace --all-features --test-runner nextest --unreferenced=reject
      - name: Test
        if: matrix.os != 'ubuntu-latest'
        run: cargo nextest run --workspace --all-features
      - name: Doctests
        run: cargo test --doc --workspace --all-features

  conformance:
    name: conformance (differential)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7
      - name: Install toolchain
        run: rustup show active-toolchain || rustup toolchain install
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Cache pandoc oracle
        uses: actions/cache@v6
        with:
          path: .oracle
          key: oracle-pandoc-${{ env.PANDOC_PIN }}
      - name: Provision pandoc oracle
        run: |
          tools/install-pandoc.sh --version="$PANDOC_PIN"
          tools/fetch-pandoc-tests.sh
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Build carta
        run: cargo build -p carta
      - name: Run conformance suite
        run: tools/conformance-suite/run.sh all

  coverage:
    name: coverage (≥90%)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7
      - name: Install toolchain
        run: rustup show active-toolchain || rustup toolchain install
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2
        with:
          tool: cargo-llvm-cov
      - name: Measure coverage (offline, product crates only)
        run: cargo llvm-cov --workspace --summary-only --fail-under-lines 90

  minimal:
    name: minimal feature build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - name: Install toolchain
        run: rustup show active-toolchain || rustup toolchain install
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2
        with:
          tool: cargo-nextest
      - name: Build single-direction config
        run: cargo build -p carta --no-default-features --features read-commonmark,write-html
      - name: Test single-direction config
        run: cargo nextest run -p carta --no-default-features --features read-commonmark,write-html
      - name: Build zero-format config
        run: cargo build -p carta --no-default-features

  fuzz-replay:
    name: fuzz build · regression replay
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # One entry per reader fuzz target (see fuzz/Cargo.toml). Add new readers here.
        target: [commonmark, json, native, html, csv, tsv, opml, rst, ipynb, mediawiki, dokuwiki, jira, man, latex, org]
    steps:
      - uses: actions/checkout@v7
      - name: Install nightly toolchain
        run: rustup toolchain install nightly
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: fuzz
      - uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2
        with:
          tool: cargo-fuzz
      - name: Build and replay ${{ matrix.target }} seed corpus
        # A deterministic PR gate, not a bug hunt: compile the target and replay its committed
        # seed corpus once with no mutation (-runs=0), so a change that reintroduces a fixed
        # crash fails here reproducibly. Random-seeded discovery fuzzing runs on a schedule in
        # fuzz.yml, never as a PR gate — so an unrelated PR is never blocked by a newly-surfaced
        # latent bug in some other reader.
        #
        #   -runs=0        execute each committed seed once, then exit; no mutation.
        #   -timeout=10    abort (and report) any single input running >10s; -max_total_time is
        #                  only checked between units, so a single hanging unit slips past it.
        #   -rss_limit_mb  bound memory so a pathological allocation is a reported crash, not an
        #                  OOM-killed runner.
        #
        # Pin the gnu target: the prebuilt cargo-fuzz is a musl binary that defaults to its own
        # musl triple, but musl links libc statically and the sanitizer cannot instrument it.
        timeout-minutes: 15
        run: >
          cargo +nightly fuzz run ${{ matrix.target }}
          --target x86_64-unknown-linux-gnu
          fuzz/seeds/${{ matrix.target }}
          -- -runs=0 -timeout=10 -rss_limit_mb=2048

  typos:
    name: typos
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14 # v1.48.0

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: Install toolchain
        run: rustup show active-toolchain || rustup toolchain install
      - uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2
        with:
          tool: cargo-deny
      - name: Check dependencies
        run: cargo deny check

name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Pinned so the corpus round-trip tests are reproducible and don't drift.
  CONFORMANCE_PIN: "3.10"

jobs:
  lint:
    name: fmt · clippy · docs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Install toolchain
        run: rustup show active-toolchain || rustup toolchain install
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features
      - name: Docs
        # Fail on any rustdoc warning. --lib matches what docs.rs publishes and sidesteps
        # the `carta` library/binary name collision.
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --workspace --lib --all-features

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - name: Install toolchain
        run: rustup show active-toolchain || rustup toolchain install
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2
        with:
          tool: cargo-nextest
      - name: Install cargo-insta
        if: matrix.os == 'ubuntu-latest'
        uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2
        with:
          tool: cargo-insta
      # The snapshot orphan check (`--unreferenced=reject`) only needs to run once.
      - name: Test (rejecting stale snapshots)
        if: matrix.os == 'ubuntu-latest'
        run: cargo insta test --workspace --all-features --test-runner nextest --unreferenced=reject
      - name: Test
        if: matrix.os != 'ubuntu-latest'
        run: cargo nextest run --workspace --all-features
      - name: Doctests
        run: cargo test --doc --workspace --all-features

  conformance:
    name: conformance (differential)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7
      - name: Install toolchain
        run: rustup show active-toolchain || rustup toolchain install
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Cache conformance dependencies
        uses: actions/cache@v6
        with:
          path: .oracle
          key: conformance-${{ env.CONFORMANCE_PIN }}
      - name: Provision conformance dependencies
        run: |
          tools/install-pandoc.sh --version="$CONFORMANCE_PIN"
          tools/fetch-pandoc-tests.sh
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Build carta
        run: cargo build -p carta
      - name: Run conformance suite
        env:
          CONF_WORK: ${{ runner.temp }}/conformance
        run: tools/conformance-suite/run.sh all
      - name: Show failing-case details
        if: failure()
        env:
          CONF_WORK: ${{ runner.temp }}/conformance
        run: |
          for log in "$CONF_WORK"/*.log; do
            [ -s "$log" ] || continue
            echo "===== $log ====="
            head -n 200 "$log"
          done
      - name: Upload conformance logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: conformance-logs
          path: ${{ runner.temp }}/conformance/*.log
          if-no-files-found: ignore

  coverage:
    name: coverage (≥90%)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7
      - name: Install toolchain
        run: rustup show active-toolchain || rustup toolchain install
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2
        with:
          tool: cargo-llvm-cov
      - name: Measure coverage (offline, product crates only)
        run: cargo llvm-cov --workspace --summary-only --fail-under-lines 90

  minimal:
    name: minimal feature build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - name: Install toolchain
        run: rustup show active-toolchain || rustup toolchain install
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2
        with:
          tool: cargo-nextest
      - name: Build single-direction config
        run: cargo build -p carta --no-default-features --features read-commonmark,write-html
      - name: Test single-direction config
        run: cargo nextest run -p carta --no-default-features --features read-commonmark,write-html
      - name: Build zero-format config
        run: cargo build -p carta --no-default-features
      - uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2
        with:
          tool: cargo-hack
      - name: Check each feature compiles in isolation
        env:
          RUSTFLAGS: -D warnings -A dead_code
        run: cargo hack check --each-feature --no-dev-deps -p carta-readers -p carta-writers -p carta

  fuzz-replay:
    name: fuzz build · regression replay
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Install nightly toolchain
        run: rustup toolchain install nightly
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: fuzz
      - uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2
        with:
          tool: cargo-fuzz
      - name: List fuzz targets
        id: targets
        # Derive the target set from fuzz/Cargo.toml so it never drifts from the [[bin]] table.
        run: echo "list=$(grep '^name = ' fuzz/Cargo.toml | grep -v 'carta-fuzz' | cut -d'"' -f2 | tr '\n' ' ')" >> "$GITHUB_OUTPUT"
      - name: Build and replay all seed corpora
        # PR gate: replay committed seeds only (-runs=0; -timeout since -max_total_time misses a hanging
        # unit); discovery is scheduled in fuzz.yml. Gnu target: the sanitizer cannot instrument musl.
        run: |
          test -d fuzz/seeds || { echo "no seeds dir" >&2; exit 1; }
          failed=""
          for t in ${{ steps.targets.outputs.list }}; do
            echo "::group::replay $t"
            if [ ! -d "fuzz/seeds/$t" ]; then
              echo "::error::no committed seeds for fuzz target $t" >&2
              failed="$failed $t"
              echo "::endgroup::"
              continue
            fi
            cargo +nightly fuzz run "$t" \
              --target x86_64-unknown-linux-gnu \
              "fuzz/seeds/$t" \
              -- -runs=0 -timeout=10 -rss_limit_mb=2048 || failed="$failed $t"
            echo "::endgroup::"
          done
          if [ -n "$failed" ]; then
            echo "replay failures:$failed" >&2
            exit 1
          fi

  typos:
    name: typos
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14 # v1.48.0

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: Install toolchain
        run: rustup show active-toolchain || rustup toolchain install
      - uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2
        with:
          tool: cargo-deny
      - name: Check dependencies
        run: cargo deny check

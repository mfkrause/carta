# Spell-checking for docs, comments, and identifiers (crate-ci/typos).
# Add genuine false positives (format names, jargon) to [default.extend-words].

[files]
# Exclude external reference data we don't author and shouldn't spell-check:
# - entities.json: the HTML named-character-reference table, keyed by spec-defined entity names
#   (e.g. &curren;, &ofr;), not prose.
# - vendor/: the vendored CommonMark spec corpus, full of deliberate test strings.
# - corpus/ast, corpus/text: hand-authored test inputs full of deliberate test strings.
extend-exclude = [
  ".oracle/",
  "target/",
  "*.lock",
  "crates/carta-readers/data/entities.json",
  "vendor/",
  "corpus/ast/",
  "corpus/text/",
]

[default]
# Rust `\u{…}` codepoint escapes are hex scalars, never prose; their interior hex digits
# (e.g. the "BA" in \u{22BA}, \u{03BA}) otherwise read as words.
extend-ignore-re = ['\\u\{[0-9A-Fa-f]+\}']
# Abbreviated git commit hashes cited throughout the plans and docs (e.g. `7b2ba0f`) are pure
# hex, but typos splits them into letter-runs ("ba" → "by"/"be"). Ignore identifiers that are
# entirely lowercase hex of commit-hash length so a SHA's interior never reads as a word.
extend-ignore-identifiers-re = ['^[0-9a-f]{7,40}$']

[default.extend-identifiers]
# Unicode scalar for the trumpet emoji (🎺); the trailing hex digits read as a word.
"1f3ba" = "1f3ba"

[default.extend-words]
# Document-format vocabulary that is not a typo
fb2 = "fb2"
# amsmath environment for a single multi-line equation; spelled without the second "i".
multline = "multline"
# LaTeX enumerate counter names emitted by the LaTeX writer (\alph, \Alph).
alph = "alph"
Alph = "Alph"
# Left when "café" renders with its accented byte as an octal escape ("caf\233").
caf = "caf"
# URI scheme for the iTunes Music Store, part of the recognized autolink scheme set.
itms = "itms"
# man macro pair delimiting a hyperlink: .UR opens a URL, .UE ends it.
UE = "UE"
# TeX/Typst math operator and relation names from the symbol tables: \hom (a hom-set),
# \oint (contour integral), \nin (negated set membership).
hom = "hom"
oint = "oint"
nin = "nin"
# roff two-letter special-character names mapped by the man reader's glyph table:
# \(Fo and \(fo are the angle-quotation marks, \(ba is the bar glyph.
Fo = "Fo"
fo = "fo"
ba = "ba"
# Test fixture key in the notebook reader: a metadata object whose keys pair the article "a"
# with each JSON value type (anull/alist/amap) to exercise scalar, array, and object values.
anull = "anull"

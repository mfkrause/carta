[files]
# External data we don't author: entity tables, vendored spec corpus, test inputs, KDE syntax/styles.
extend-exclude = [
  ".oracle/",
  "target/",
  "*.lock",
  "crates/carta-readers/data/entities.json",
  "crates/carta-writers/data/entities.json",
  "crates/carta-highlight/data/syntax/",
  "crates/carta-highlight/data/styles/",
  "vendor/",
  "corpus/ast/",
  "corpus/text/",
]

[default]
# `\u{…}` escapes are hex, not prose; interior digit pairs otherwise read as words.
extend-ignore-re = ['\\u\{[0-9A-Fa-f]+\}']
# Abbreviated commit hashes are pure hex; stop letter-runs like "ba" reading as words.
extend-ignore-identifiers-re = ['^[0-9a-f]{7,40}$']

[default.extend-identifiers]
# Trumpet emoji scalar; the trailing hex digits read as a word.
"1f3ba" = "1f3ba"

[default.extend-words]
# Document-format vocabulary that is not a typo
fb2 = "fb2"
# OpenDocument Format, the standard the OpenDocument reader parses.
ODF = "ODF"
# Cross-reference target `thm1` in an OpenDocument reader fixture, kept verbatim.
thm = "thm"
# EPUB Open Packaging Format XML namespace prefix (opf:role, opf:file-as).
opf = "opf"
# amsmath environment, spelled without the second "i".
multline = "multline"
# LaTeX enumerate counter names emitted by the LaTeX writer (\alph, \Alph).
alph = "alph"
Alph = "Alph"
# "café" rendered with its accented byte as an octal escape ("caf\233").
caf = "caf"
# iTunes Music Store URI scheme, a recognized autolink scheme.
itms = "itms"
# man hyperlink macro pair: .UR opens a URL, .UE ends it.
UE = "UE"
# TeX/Typst symbol-table names: \hom, \oint, \nin.
hom = "hom"
oint = "oint"
nin = "nin"
# roff glyph names in the man reader: \(Fo/\(fo angle quotes, \(ba bar.
Fo = "Fo"
fo = "fo"
ba = "ba"
# Notebook-reader fixture key pairing "a" with each JSON value type (anull/alist/amap).
anull = "anull"
# CSS class the HTML writer stamps for the "Other" token kind in colorized code.
ot = "ot"
# KDE syntax-definition schema element (`itemData` children, variable `item_datas`).
datas = "datas"
# RTF control words: \pard resets paragraph formatting, \pn opens numbering, \headerr sets the right header.
pard = "pard"
pn = "pn"
headerr = "headerr"

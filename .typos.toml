# Spell-checking for docs, comments, and identifiers (crate-ci/typos).
# Add genuine false positives (format names, jargon) to [default.extend-words].

[files]
# Exclude external reference data we don't author and shouldn't spell-check:
# - entities.json: the HTML named-character-reference table, keyed by spec-defined entity names
#   (e.g. &curren;, &ofr;), not prose.
# - vendor/: the vendored CommonMark spec corpus, full of deliberate test strings.
# - corpus/ast, corpus/text: hand-authored test inputs full of deliberate test strings.
extend-exclude = [
  ".oracle/",
  "target/",
  "*.lock",
  "crates/carta-readers/data/entities.json",
  "vendor/",
  "corpus/ast/",
  "corpus/text/",
]

[default.extend-words]
# Document-format vocabulary that is not a typo
fb2 = "fb2"
# LaTeX enumerate counter names emitted by the LaTeX writer (\alph, \Alph).
alph = "alph"
Alph = "Alph"
# Left when "café" renders with its accented byte as an octal escape ("caf\233").
caf = "caf"
# URI scheme for the iTunes Music Store, part of the recognized autolink scheme set.
itms = "itms"
# man macro pair delimiting a hyperlink: .UR opens a URL, .UE ends it.
UE = "UE"

[changelog]
# Hand-written preamble; release tooling inserts version sections below it.
header = """# Changelog

All notable changes to carta are documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/), and this
project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html). While the
version is below `0.1.0`, anything may change at any time.
"""

# `<!-- N -->` prefixes fix group order (otherwise alphabetical); the body template strips them.
commit_parsers = [
  { message = "^ci", skip = true },
  { message = "^docs", skip = true },
  { message = "^chore", skip = true },
  { message = "^feat", group = "<!-- 0 -->added" },
  { message = "^fix", group = "<!-- 1 -->fixed" },
  { message = "^perf", group = "<!-- 2 -->performance" },
  { message = "^sec", group = "<!-- 3 -->security" },
  { message = "^revert", group = "<!-- 4 -->reverted" },
  { message = ".*", group = "<!-- 5 -->other" },
]

# Stock body template plus `striptags` so the ordering prefixes never reach the changelog.
body = """
## [{{ version }}]{%- if release_link -%}({{ release_link }}){% endif %} - {{ timestamp | date(format="%Y-%m-%d") }}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}

{% for commit in commits %}
{%- if commit.scope -%}
- *({{commit.scope}})* {% if commit.breaking %}[**breaking**] {% endif %}{{ commit.message }}{%- if commit.links %} ({% for link in commit.links %}[{{link.text}}]({{link.href}}) {% endfor -%}){% endif %}
{% else -%}
- {% if commit.breaking %}[**breaking**] {% endif %}{{ commit.message }}
{% endif -%}
{% endfor -%}
{% endfor %}"""

# All crates share one version; `carta` is the sole release representative: it owns the root
# CHANGELOG.md (folding in the other crates), the `v<version>` tag, and the GitHub release.
[[package]]
name = "carta"
version_group = "carta"
changelog_path = "CHANGELOG.md"
changelog_include = ["carta-ast", "carta-core", "carta-highlight", "carta-readers", "carta-writers"]
git_tag_name = "v{{ version }}"

# Remaining crates publish to crates.io but delegate changelog, tag, and release to `carta`.
[[package]]
name = "carta-ast"
version_group = "carta"
changelog_update = false
git_tag_enable = false
git_release_enable = false

[[package]]
name = "carta-core"
version_group = "carta"
changelog_update = false
git_tag_enable = false
git_release_enable = false

[[package]]
name = "carta-highlight"
version_group = "carta"
changelog_update = false
git_tag_enable = false
git_release_enable = false

[[package]]
name = "carta-readers"
version_group = "carta"
changelog_update = false
git_tag_enable = false
git_release_enable = false

[[package]]
name = "carta-writers"
version_group = "carta"
changelog_update = false
git_tag_enable = false
git_release_enable = false
